name: Build and Deploy WeatherAPI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Kubernetes
        run: |
          whoami
          echo $HOME
          ls -la $HOME/.kube
          kubectl config view