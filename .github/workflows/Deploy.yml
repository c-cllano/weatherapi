name: Build and Deploy WeatherAPI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/weatherapi:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/weatherapi:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          export KUBECONFIG=$HOME/.kube/config
          kubectl cluster-info

      - name: Debug - Show kubeconfig server field
        run: |
          echo "=== Contenido del campo server ==="
          grep 'server:' $HOME/.kube/config
          echo "=== Tamaño del archivo kubeconfig ==="
          wc -l $HOME/.kube/config
          echo "=== Primeras 20 líneas del kubeconfig ==="
          head -20 $HOME/.kube/config

      - name: Debug - Show KUBECONFIG variable
        run: |
          echo "=== Variable KUBECONFIG ==="
          echo $KUBECONFIG
          echo "=== Usuario actual ==="
          whoami
          echo "=== Directorio actual ==="
          pwd
 
      - name: Debug - Test kubectl connection verbose
        run: |
          echo "=== Intentando conexión a kubectl ==="
          kubectl cluster-info --v=6

      - name: Debug kubeconfig server
        run: |
          whoami
          grep 'server:' $HOME/.kube/config

      - name: Test Kubernetes connection
        run: kubectl get nodes

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/deployment.yaml
