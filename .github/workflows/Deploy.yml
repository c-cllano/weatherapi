name: Build and Deploy WeatherAPI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/weatherapi:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/weatherapi:latest

      - name: Deploy to Kubernetes
        run: |
           kubectl --kubeconfig=/home/adm_c-cllano/.kube/config cluster-info
           kubectl --kubeconfig=/home/adm_c-cllano/.kube/config apply -f k8s/deployment.yaml
