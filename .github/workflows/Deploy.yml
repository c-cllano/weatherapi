name: Build and Deploy WeatherAPI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/weatherapi:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/weatherapi:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Create kube directory
        run: mkdir -p $HOME/.kube

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Test Kubernetes connection
        run: kubectl get nodes

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/deployment.yaml