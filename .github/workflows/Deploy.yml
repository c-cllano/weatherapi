name: Build and Deploy WeatherAPI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/weatherapi:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/weatherapi:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $(dirname $KUBECONFIG)
          echo "${{ secrets.KUBE_CONFIG }}" > $KUBECONFIG
          chmod 600 $KUBECONFIG
          echo "=== Kubeconfig creado en: $KUBECONFIG ==="
          ls -la $KUBECONFIG

      - name: Debug 1 - Verificar contenido del kubeconfig
        run: |
          echo "=== KUBECONFIG variable ==="
          echo $KUBECONFIG
          echo ""
          echo "=== Contenido completo del kubeconfig ==="
          cat $KUBECONFIG
          echo ""
          echo "=== Campo server ==="
          grep 'server:' $KUBECONFIG

      - name: Debug 2 - Verificar archivo existe y permisos
        run: |
          echo "=== Verificar archivo ==="
          if [ -f "$KUBECONFIG" ]; then
            echo "✓ Archivo existe"
            ls -la "$KUBECONFIG"
            echo "Tamaño: $(wc -c < $KUBECONFIG) bytes"
          else
            echo "✗ Archivo NO existe"
            exit 1
          fi

      - name: Debug 3 - Test kubectl config view
        run: |
          echo "=== kubectl config view ==="
          kubectl config view
          echo ""
          echo "=== kubectl config current-context ==="
          kubectl config current-context

      - name: Debug 4 - Test kubectl cluster-info
        run: |
          echo "=== kubectl cluster-info ==="
          kubectl cluster-info

      - name: Debug 5 - Test kubectl get nodes
        run: |
          echo "=== kubectl get nodes ==="
          kubectl get nodes

      - name: Debug 6 - Verificar resourcequotas ANTES de apply
        run: |
          echo "=== kubectl get resourcequotas en default namespace ==="
          kubectl get resourcequotas -n default || echo "Sin resourcequotas"

      - name: Debug 7 - Verificar deployment.yaml
        run: |
          echo "=== Contenido de k8s/deployment.yaml ==="
          cat k8s/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          echo "=== Ejecutando kubectl apply ==="
          echo "KUBECONFIG=$KUBECONFIG"
          kubectl apply -f k8s/deployment.yaml --server-side --force-conflicts






