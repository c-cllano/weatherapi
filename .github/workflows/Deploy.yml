name: Build and Deploy WeatherAPI

on:
push:
branches:
- main

jobs:
build-and-deploy:


runs-on: ubuntu-latest

steps:

- name: Checkout repository
  uses: actions/checkout@v4

# Login al container registry de GitHub
- name: Login to GHCR
  uses: docker/login-action@v3
  with:
    registry: ghcr.io
    username: ${{ github.actor }}
    password: ${{ secrets.GITHUB_TOKEN }}

# Construir imagen
- name: Build Docker image
  run: |
    docker build -t ghcr.io/${{ github.repository_owner }}/weatherapi:latest .

# Publicar imagen
- name: Push Docker image
  run: |
    docker push ghcr.io/${{ github.repository_owner }}/weatherapi:latest

# Instalar kubectl
- name: Install kubectl
  uses: azure/setup-kubectl@v3

# Crear carpeta kube
- name: Create kube directory
  run: mkdir -p $HOME/.kube

# Cargar kubeconfig desde secrets
- name: Set kubeconfig
  run: |
    echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

# Verificar conexión al cluster
- name: Test Kubernetes connection
  run: kubectl get nodes

# Deploy aplicación
- name: Deploy to Kubernetes
  run: kubectl apply -f k8s/deployment.yaml

